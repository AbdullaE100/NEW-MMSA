name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test tooling
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff numpy

      # The unit tests are intentionally dependency-light: they cover the pure
      # logic (deterministic audio framing, config invariants) without pulling
      # in TensorFlow / torch / DeepFace or the model weights, so CI stays fast.
      - name: Lint (syntax + import errors only)
        run: ruff check --select E9,F63,F7,F82 .

      - name: Run unit tests
        run: pytest tests/ -v
